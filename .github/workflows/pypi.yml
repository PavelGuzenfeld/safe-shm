name: Build and Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU for aarch64
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp39-manylinux* cp310-manylinux* cp311-manylinux* cp312-manylinux* cp313-manylinux*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: >-
            yum install -y gcc-toolset-13-gcc-c++ cmake git &&
            source /opt/rh/gcc-toolset-13/enable &&
            git clone --depth 1 --branch 10.2.1 https://github.com/fmtlib/fmt.git /tmp/fmt &&
            cd /tmp/fmt && mkdir build && cd build &&
            cmake .. -DCMAKE_BUILD_TYPE=Release -DFMT_TEST=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON &&
            make -j$(nproc) && make install &&
            git clone --depth 1 https://github.com/PavelGuzenfeld/exception-rt.git /tmp/exception-rt &&
            cd /tmp/exception-rt && mkdir build && cd build &&
            cmake .. -DCMAKE_BUILD_TYPE=Release -DEXCEPTION_RT_BUILD_TESTS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON &&
            make -j$(nproc) && make install &&
            git clone --depth 1 https://github.com/PavelGuzenfeld/shm.git /tmp/shm &&
            cd /tmp/shm && sed -i '/^# Test executable/,$ d' CMakeLists.txt &&
            mkdir build && cd build &&
            cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON &&
            make -j$(nproc) && make install
          CIBW_ENVIRONMENT_LINUX: >-
            PATH=/opt/rh/gcc-toolset-13/root/usr/bin:$PATH
            LD_LIBRARY_PATH=/opt/rh/gcc-toolset-13/root/usr/lib64:/opt/rh/gcc-toolset-13/root/usr/lib:${LD_LIBRARY_PATH:-}
            CC=/opt/rh/gcc-toolset-13/root/usr/bin/gcc
            CXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/safe-shm
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC) by default.
        # Falls back to PYPI_API_TOKEN secret if trusted publishing is not configured.
        with:
          password: ${{ secrets.PYPI_API_TOKEN || '' }}
